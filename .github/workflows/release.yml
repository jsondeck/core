name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          # Intentionally omit registry-url for npm Trusted Publishing.
          # setup-node writes token-based auth config when registry-url is set,
          # which can make npm publish fall back to NODE_AUTH_TOKEN instead of OIDC.

      - name: Install npm 11 for trusted publishing
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Run full check
        run: npm run check

      - name: Audit runtime dependencies
        run: npm audit --omit=dev

      - name: Publish unpublished package to npm
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "@jsondeck/core@${VERSION}" version >/dev/null 2>&1; then
            echo "@jsondeck/core@${VERSION} is already published; skipping npm publish."
            exit 0
          fi
          npm publish --access public --provenance
